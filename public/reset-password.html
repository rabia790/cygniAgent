<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - CygniSoft AI Agent</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/reset-password.js"></script>
  </head>
  <body>
    <section class="auth-view">
      <form id="resetForm" class="auth-card">
        <p class="eyebrow">Reset your password</p>
        <h1>CygniSoft AI Agent</h1>
        <label for="newPassword">
          <span>New Password</span>
          <input id="newPassword" type="password" autocomplete="new-password" required />
        </label>
        <label for="confirmNewPassword">
          <span>Confirm New Password</span>
          <input id="confirmNewPassword" type="password" autocomplete="new-password" required />
        </label>
        <div class="actions">
          <button id="resetPasswordButton" class="primary-button" type="submit">
            <span class="spinner" hidden></span>
            <span class="button-text">Update Password</span>
          </button>
        </div>
        <p id="resetStatus" class="status" data-type="neutral" role="status"></p>
      </form>
    </section>
  </body>
</html>
